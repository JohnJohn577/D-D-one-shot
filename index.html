<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>D&D One Shot</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header>
        <h1>D&amp;D One Shot</h1>
        <p id="chapterLabel" class="chapter-label"></p>
      </header>

      <section class="scene-card">
        <h2 id="sceneTitle">Loading…</h2>
        <p id="sceneBody"></p>
      </section>

      <nav id="choices" class="choices" aria-label="Scene choices"></nav>
      <p id="status" class="status" role="status" aria-live="polite"></p>
    </main>

    <script type="module" src="main.js"></script>
  </body>
</html>
